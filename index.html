<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éclat Naturel</title>
    <style>
        body { font-family: sans-serif; background: #fdf5f2; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .product-card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; }
        
        #grattage-container { position: relative; width: 300px; height: 150px; margin: 20px auto; border: 3px solid #d4a373; border-radius: 10px; overflow: hidden; background: #faedcd; }
        #carte-gagnante { position: absolute; top:0; left:0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; font-weight: bold; color: #d4a373; opacity: 0; transition: opacity 0.3s; }
        #canvas-grattage { position: absolute; top: 0; left: 0; width: 300px; height: 150px; z-index: 2; touch-action: none; }
        
        .btn-whatsapp { display: block; background: #25D366; color: white; padding: 15px; text-decoration: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
        .reset-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 20px; font-size: 10px; color: #666; }
    </style>
</head>
<body>

<h1>✨ ÉCLAT NATUREL ✨</h1>

<div class="grid">
    <div class="product-card"><img src="https://images.unsplash.com/photo-1598440947619-2c35fc95a088?w=300" class="product-img"><p>Sérum</p></div>
    <div class="product-card"><img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=300" class="product-img"><p>Crème</p></div>
    <div class="product-card"><img src="https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=300" class="product-img"><p>Masque</p></div>
    <div class="product-card"><img src="https://images.unsplash.com/photo-1556228720-195c672e8a15?w=300" class="product-img"><p>Huile</p></div>
</div>

<div id="grattage-container">
    <div id="carte-gagnante">
        <span id="msg-resultat">Chargement...</span>
    </div>
    <canvas id="canvas-grattage"></canvas>
</div>

<a id="btn-contact" href="#" class="btn-whatsapp">💬 Contacter le vendeur</a>

<button class="reset-btn" onclick="localStorage.clear(); location.reload();">🔄 Réinitialiser le test</button>

<script>
    const canvas = document.getElementById('canvas-grattage');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg-resultat');
    const carte = document.getElementById('carte-gagnante');
    
    // 1. Logique de résultat
    const rand = Math.random();
    let messageWhatsApp;
    
    if (rand < 0.3) { 
        msg.innerText = "10% de réduction !"; 
        messageWhatsApp = "Salut, je veux commander. J'ai gagné : 10% de réduction !";
    } else if (rand < 0.6) { 
        msg.innerText = "5% de réduction !"; 
        messageWhatsApp = "Salut, je veux commander. J'ai gagné : 5% de réduction !";
    } else { 
        msg.innerText = "Pas de chance..."; 
        messageWhatsApp = "Salut, je veux commander."; 
    }

    document.getElementById('btn-contact').href = "https://wa.me/2250160842790?text=" + encodeURIComponent(messageWhatsApp);

    // 2. Initialisation Canvas
    ctx.fillStyle = '#b7b7a4';
    ctx.fillRect(0, 0, 300, 150);
    ctx.fillStyle = '#fff';
    ctx.font = "bold 20px Arial";
    ctx.fillText("GRATTEZ ICI !", 80, 85);

    // 3. Gestion du grattage
    if (localStorage.getItem('aDejaGagne') === 'oui') {
        canvas.style.display = 'none';
        carte.style.opacity = '1';
    }

    function gratter(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(touch.clientX - rect.left, touch.clientY - rect.top, 35, 0, Math.PI * 2);
        ctx.fill();
        
        // Révélation au grattage
        carte.style.opacity = '1';
        localStorage.setItem('aDejaGagne', 'oui');
    }

    canvas.addEventListener('touchmove', gratter, {passive: false});
    canvas.addEventListener('touchstart', gratter, {passive: false});
</script>
</body>
</html>
